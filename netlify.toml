[build]
  publish = "build"
  command = "npm run build"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-inline' https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https:; connect-src 'self' https://www.google.com https://*.googleapis.com https://*.firebaseio.com https://*.firebase.googleapis.com wss://*.firebaseio.com https://online-media-tools-server-vercel.vercel.app https://online-media-tools-server-vercel.onrender.com https://onlinemediadeals.s3.eu-north-1.amazonaws.com; frame-src 'self' https://www.google.com https://recaptcha.google.com; worker-src 'self' blob:; upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    X-Powered-By = ""

[[redirects]]
  from = "/elmah.axd"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/elmah"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.env"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/web.config"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
